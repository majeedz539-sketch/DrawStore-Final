version: '3.8'

services:
  drawstore:
    build: .
    container_name: drawstore-loader
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    volumes:
      - ./files:/app/files
      - ./download_stats.json:/app/download_stats.json
    restart: unless-stopped

volumes:
  files:
    driver: local
