<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawStore - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0f;
            --bg-card: rgba(15, 15, 25, 0.95);
            --accent-blue: #0066ff;
            --accent-cyan: #00d4ff;
            --accent-purple: #6b21ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: rgba(0, 102, 255, 0.3);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 102, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(107, 33, 255, 0.05) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Grid Pattern */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 102, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 102, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 
                0 0 60px rgba(0, 102, 255, 0.3),
                0 0 100px rgba(0, 212, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: cardSlideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            animation: logoFloat 3s ease-in-out infinite;
            box-shadow: 0 10px 40px rgba(0, 102, 255, 0.4);
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .login-card h1 {
            font-size: 2.8em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 1em;
            font-weight: 400;
        }
        
        .form-group {
            margin-bottom: 28px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 12px;
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-blue);
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        
        .form-group input {
            width: 100%;
            padding: 18px 50px 18px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 102, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Poppins', sans-serif;
        }
        
        .form-group input::placeholder {
            color: var(--text-secondary);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(0, 102, 255, 0.05);
            box-shadow: 
                0 0 0 4px rgba(0, 212, 255, 0.1),
                0 0 30px rgba(0, 212, 255, 0.2);
        }
        
        .form-group input:focus + i {
            color: var(--accent-cyan);
        }
        
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 30px rgba(0, 102, 255, 0.3);
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 102, 255, 0.4);
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-blue) 100%);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .error-message {
            background: rgba(255, 0, 80, 0.1);
            border: 1px solid rgba(255, 0, 80, 0.3);
            color: #ff0050;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: errorSlide 0.4s ease;
        }
        
        @keyframes errorSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .error-message i {
            font-size: 1.3em;
        }
        
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin: 35px 0;
        }
        
        .info-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9em;
            line-height: 1.7;
        }
        
        .info-text strong {
            color: var(--accent-cyan);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 30px;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.3em;
            text-decoration: none;
        }
        
        .social-btn:hover {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-color: var(--accent-cyan);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
            color: #ffffff;
        }
        
        @media (max-width: 600px) {
            .login-card {
                padding: 40px 25px;
            }
            
            .login-card h1 {
                font-size: 2.2em;
            }
            
            .logo-icon {
                width: 80px;
                height: 80px;
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1>DRAWSTORE</h1>
                <p class="login-subtitle">أدخل مفتاح الترخيص الخاص بك</p>
            </div>
            
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="license_key">مفتاح الترخيص</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="license_key" 
                            name="license_key" 
                            placeholder="أدخل مفتاح الترخيص"
                            required
                            autofocus
                        >
                        <i class="fas fa-key"></i>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-arrow-right"></i> دخول
                </button>
            </form>
            
            <div class="divider"></div>
            
            <div class="info-text">
                <p>
                    <strong>مستخدم جديد؟</strong><br>
                    تواصل معنا عبر القنوات أدناه للحصول على مفتاح الترخيص
                </p>
            </div>
            
            <div class="social-links">
                <a href="https://discord.gg/Ad66M4CW8v" target="_blank" class="social-btn" title="Discord">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="https://www.tiktok.com/@drawstore" target="_blank" class="social-btn" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
