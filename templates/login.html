<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawStore - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0f1419;
            --secondary: #1a1f2e;
            --accent: #00d4ff;
            --accent-dark: #0099cc;
            --text-light: #e0e0e0;
            --text-lighter: #a0a0a0;
            --success: #00ff88;
            --error: #ff3366;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* Background Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 153, 204, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(26, 31, 46, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 212, 255, 0.2);
            animation: slideIn 0.6s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo-svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            animation: none;
        }
        
        .login-card h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, var(--accent) 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            color: var(--text-lighter);
            margin-bottom: 30px;
            font-size: 1em;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .form-group input::placeholder {
            color: var(--text-lighter);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        
        .form-group input:valid {
            border-color: var(--success);
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        .error-message i {
            font-size: 1.2em;
        }
        
        .info-text {
            text-align: center;
            color: var(--text-lighter);
            font-size: 0.9em;
            line-height: 1.6;
        }
        
        .divider {
            height: 1px;
            background: rgba(0, 212, 255, 0.1);
            margin: 30px 0;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }
        
        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2em;
            text-decoration: none;
        }
        
        .social-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent);
            transform: translateY(-3px);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .login-card h1 {
                font-size: 2em;
            }
            
            .logo-svg {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="DrawStore Logo" class="logo-svg">
                <h1>DrawStore</h1>
                <p class="login-subtitle">أدخل مفتاح الترخيص الخاص بك</p>
            </div>
            
            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="license_key">
                        <i class="fas fa-key"></i> مفتاح الترخيص
                    </label>
                    <input 
                        type="text" 
                        id="license_key" 
                        name="license_key" 
                        placeholder="أدخل مفتاح الترخيص الخاص بك"
                        required
                        autofocus
                    >
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-sign-in-alt"></i> دخول
                </button>
            </form>
            
            <div class="divider"></div>
            
            <div class="info-text">
                <p>
                    <strong>هل أنت مستخدم جديد؟</strong><br>
                    تواصل معنا عبر وسائل التواصل أدناه للحصول على مفتاح الترخيص
                </p>
            </div>
            
            <div class="social-links">
                <a href="https://discord.gg/Ad66M4CW8v" target="_blank" class="social-btn" title="Discord">
                    <i class="fab fa-discord"></i>
                </a>
                <a href="https://www.tiktok.com/@drawstore" target="_blank" class="social-btn" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
